services:
  - type: web
    name: pilates-chat-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn chat:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OXLO_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
